name: markdownlint
description: Run markdownlint-cli2

runs:
  using: composite
  steps:
    - name: Checkout sources
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Bun
      uses: oven-sh/setup-bun@ab8cb4e8f89912a29b87e4abc4554f2301648a5c # v1.0.4

    - name: Install dependencies
      shell: bash
      run: |
        bun install --frozen-lockfile

        # If katex was published with a build placeholder, replace it so runtime doesn't error.
        # This patches node_modules/katex/dist/katex.mjs to set a concrete version string.
        KATEX_FILE="node_modules/katex/dist/katex.mjs"
        if [ -f "$KATEX_FILE" ]; then
          # Replace `const version = __VERSION__;` with the known installed version.
          sed -i 's/const version = __VERSION__;/const version = "0.16.34";/' "$KATEX_FILE" || true
        fi

    - name: Lint markdown
      shell: bash
      run: bunx markdownlint-cli2 "**/*.md" "**/*.mdx"
